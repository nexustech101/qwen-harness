[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qwen-coder"
version = "0.1.0"
description = "Coding agent powered by local LLMs via Ollama"
readme = "harness/PROJECT_SPECS.md"
requires-python = ">=3.10"
dependencies = [
    "ollama>=0.4.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "python-multipart>=0.0.9",
    "registers>=0.1.0",
    "pydantic-settings>=2.3.0",
    "slowapi>=0.1.9",
    "python-jose[cryptography]>=3.3.0",
    "email-validator>=2.2.0",
    "stripe>=13.0.0",
    "firebase-admin>=6.5.0",
]

[project.scripts]
qwen-coder = "harness.main:main"
qwen-coder-capture = "harness.scripts.capture_model_formats:main"

[tool.setuptools.packages.find]
include = ["harness*"]

[tool.setuptools.package-data]
"harness.prompts" = ["*.md"]
